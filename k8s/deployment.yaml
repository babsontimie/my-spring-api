apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-spring-api
  labels:
    app: my-spring-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-spring-api
  template:
    metadata:
      labels:
        app: my-spring-api
    spec:
      containers:
        - name: my-spring-api
          image: your-dockerhub-username/my-spring-api:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: production
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
