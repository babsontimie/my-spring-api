name: CI - Java matrix (17, 21)

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    name: Build and test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [17, 21]

    permissions:
      contents: read
      packages: write

    steps:
      # 1️⃣ Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Set up JDK and cache Maven
      - name: Set up JDK and cache Maven
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      # 3️⃣ Build and run tests (runs for all Java versions)
      - name: Build and run tests
        run: mvn -B -V clean test

      # 4️⃣ Package (create jar)
      - name: Package (create jar)
        run: mvn -B -V -DskipTests package

      # 5️⃣ Upload artifact (jar)
      - name: Upload artifact (jar)
        uses: actions/upload-artifact@v4
        with:
          name: my-spring-api-jar
          path: target/*.jar

      # 🔹 The following steps run only for Java 21 on main branch
      - name: Deploy Docker & Kind (Java 21 only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.java == '21'
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          GHCR_IMAGE=ghcr.io/${{ github.repository_owner }}/my-spring-api:$SHORT_SHA
          DOCKERHUB_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/my-spring-api:$SHORT_SHA

          # Docker login
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          echo ${{ secrets.DOCKERHUB_PASSWORD }} | docker login docker.io -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

          # Build and push Docker images
          docker build -f Dockerfile.runtime -t $GHCR_IMAGE -t $DOCKERHUB_IMAGE .
          docker push $GHCR_IMAGE
          docker push $DOCKERHUB_IMAGE

          # Install kind
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

          # Create kind cluster
          cat <<EOF > kind-cluster.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
            - role: worker
            - role: worker
          EOF
          kind create cluster --name kind-teetestcluster --config kind-cluster.yaml

          # Load image into kind
          kind load docker-image $GHCR_IMAGE --name kind-teetestcluster
          kind load docker-image $DOCKERHUB_IMAGE --name kind-teetestcluster

          # Deploy Spring API
          cat <<EOF > deployment.yaml
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: my-spring-api
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: my-spring-api
            template:
              metadata:
                labels:
                  app: my-spring-api
              spec:
                containers:
                  - name: my-spring-api
                    image: $GHCR_IMAGE
                    ports:
                      - containerPort: 8080
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: my-spring-api-service
          spec:
            type: NodePort
            selector:
              app: my-spring-api
            ports:
              - protocol: TCP
                port: 8080
                nodePort: 30080
          EOF

          kubectl apply -f deployment.yaml
          kubectl wait --for=condition=ready pod -l app=my-spring-api --timeout=120s
          kubectl get pods -o wide