name: CI - Build, Docker, Kind Deploy

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-deploy:
    # runs-on: ubuntu-latest
    runs-on: self-hosted
    strategy:
      matrix:
        # java: [17, 21]
        java: [17, 21]
        
    permissions:
      contents: read
      packages: write

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Setup Java
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      # 3️⃣ Build & Test
      - name: Build and test
        run: mvn -B -V clean test

      # 4️⃣ Package JAR
      - name: Package JAR
        run: mvn -B -DskipTests package

      # 5️⃣ Detect JAR dynamically
      - name: Detect JAR
        run: |
          JAR_FILE=$(ls target/*.jar | xargs -n 1 basename)
          echo "JAR_FILE=$JAR_FILE" >> $GITHUB_ENV
          echo "Detected JAR: $JAR_FILE"

      # Skip Docker + deploy if not Java 21
      - name: Stop if not Java 21
        if: matrix.java != '21'
        run: echo "Skipping Docker + deploy for Java ${{ matrix.java }}" && exit 0

      # 6️⃣ Login to GitHub Container Registry (GHCR)
      - name: Login GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 7️⃣ Login to Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 8️⃣ Build & Push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.runtime
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/my-spring-api:${{ github.sha }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/my-spring-api:${{ github.sha }}
          build-args: |
            JAR_FILE=${{ env.JAR_FILE }}

      # 9️⃣ Install kind
      - name: Install kind
        run: |
          curl -Lo kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x kind
          sudo mv kind /usr/local/bin/

      # 🔟 Create kind cluster
      - name: Create kind cluster
        run: |
          cat <<EOF > kind.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
            - role: worker
            - role: worker
          EOF
          kind create cluster --name kind-teetestcluster --config kind.yaml

      # 1️⃣1️⃣ Load Docker image into kind
      - name: Load image into kind
        run: |
          kind load docker-image ghcr.io/${{ github.repository_owner }}/my-spring-api:${{ github.sha }} --name kind-teetestcluster

      # 1️⃣2️⃣ Inject image into deployment
      - name: Inject image into deployment
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|ghcr.io/${{ github.repository_owner }}/my-spring-api:${{ github.sha }}|g" k8s/deployment.yaml

      # 1️⃣3️⃣ Deploy to Kubernetes
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/

      # 1️⃣4️⃣ Wait for rollout
      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/my-spring-api --timeout=180s

      # 1️⃣5️⃣ Debug cluster
      - name: Debug cluster
        run: |
          kubectl get pods -o wide
          kubectl get svc
