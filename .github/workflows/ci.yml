name: CI - Java matrix (17, 21)

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    name: Build and test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # java: [17, 21]
        java: [21]

    permissions:
      contents: read
      packages: write

    steps:
      # 1️⃣ Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Set up JDK and cache Maven
      - name: Set up JDK and cache Maven
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      # 3️⃣ Debug matrix info
      - name: Debug matrix
        run: |
          echo "Running Java version: ${{ matrix.java }}"
          echo "GitHub ref: ${{ github.ref }}"
          java -version

      # 4️⃣ Build and run tests
      - name: Build and run tests
        run: mvn -B -V clean test

      # 5️⃣ Package jar
      - name: Package (create jar)
        run: mvn -B -V -DskipTests package

      # 6️⃣ Upload artifact
      - name: Upload artifact (jar)
        uses: actions/upload-artifact@v4
        with:
          name: my-spring-api-jar
          path: target/*.jar

      # 7️⃣ Docker login GHCR (Java 21 only)
      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && matrix.java == '21'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 8️⃣ Docker login Docker Hub (Java 21 only)
      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main' && matrix.java == '21'
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # 9️⃣ Build and push Docker image (Java 21 only)
      - name: Build and push Docker images
        if: github.ref == 'refs/heads/main' && matrix.java == '21'
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "Short SHA tag: $SHORT_SHA"

          GHCR_IMAGE=ghcr.io/${{ github.repository_owner }}/my-spring-api:$SHORT_SHA
          DOCKERHUB_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/my-spring-api:$SHORT_SHA

          echo "Building Docker images..."
          docker build -f Dockerfile.runtime -t $GHCR_IMAGE -t $DOCKERHUB_IMAGE .
          docker push $GHCR_IMAGE
          docker push $DOCKERHUB_IMAGE

      # 🔟 Install kind (Java 21 only)
      - name: Install kind
        if: github.ref == 'refs/heads/main' && matrix.java == '21'
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      # 1️⃣1️⃣ Create kind cluster (Java 21 only)
      - name: Create kind cluster
        if: github.ref == 'refs/heads/main' && matrix.java == '21'
        run: |
          cat <<EOF > kind-cluster.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
            - role: worker
            - role: worker
          EOF
          kind create cluster --name kind-teetestcluster --config kind-cluster.yaml

      # 1️⃣2️⃣ Load Docker images into kind (Java 21 only)
      - name: Load Docker images into kind
        if: github.ref == 'refs/heads/main' && matrix.java == '21'
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "Loading Docker images into kind cluster..."
          kind load docker-image ghcr.io/${{ github.repository_owner }}/my-spring-api:$SHORT_SHA --name kind-teetestcluster
          kind load docker-image ${{ secrets.DOCKERHUB_USERNAME }}/my-spring-api:$SHORT_SHA --name kind-teetestcluster

      # 1️⃣3️⃣ Deploy Spring Boot app to kind using k8s folder
      - name: Deploy Spring API to kind
        if: github.ref == 'refs/heads/main' && matrix.java == '21'
        run: |
          SHORT_SHA=${GITHUB_SHA::7}

          echo "Updating deployment.yaml with image tag..."
          sed -i "s|IMAGE_PLACEHOLDER|ghcr.io/${{ github.repository_owner }}/my-spring-api:$SHORT_SHA|g" k8s/deployment.yaml

          echo "Applying Kubernetes manifests..."
          kubectl apply -f k8s/

          echo "Waiting for pods to be ready..."
          kubectl wait --for=condition=ready pod -l app=my-spring-api --timeout=180s
          kubectl get pods -o wide