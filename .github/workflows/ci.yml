name: CI - Build, Docker, Kind Deploy

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-deploy:
    runs-on: self-hosted
    strategy:
      matrix:
        # java: [17, 21]
        java: [17, 21]
    permissions:
      contents: read
      packages: write

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Detect JAR dynamically (optional, mostly for info)
      - name: Detect JAR name
        run: |
          echo "JAR_FILE=my-spring-api.jar" >> $GITHUB_ENV
          echo "Detected JAR: my-spring-api.jar"

      # 3️⃣ Login to GitHub Container Registry (GHCR)
      - name: Login GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # 4️⃣ Login to Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5️⃣ Build & Push Docker image (multi-stage, Maven in builder)
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.runtime
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/my-spring-api:${{ github.sha }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/my-spring-api:${{ github.sha }}
          build-args: |
            JAR_FILE=${{ env.JAR_FILE }}

      # 6️⃣ Install kind
      - name: Install kind
        run: |
          curl -Lo kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x kind
          sudo mv kind /usr/local/bin/

      # 7️⃣ Create kind cluster
      - name: Create kind cluster
        run: |
          cat <<EOF > kind.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
            - role: worker
            - role: worker
          EOF
          kind create cluster --name kind-teetestcluster --config kind.yaml

      # 8️⃣ Load Docker image into kind
      - name: Load image into kind
        run: |
          kind load docker-image ghcr.io/${{ github.repository_owner }}/my-spring-api:${{ github.sha }} --name kind-teetestcluster

      # 9️⃣ Inject image into deployment
      - name: Inject image into deployment
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|ghcr.io/${{ github.repository_owner }}/my-spring-api:${{ github.sha }}|g" k8s/deployment.yaml

      # 🔟 Deploy to Kubernetes
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/

      # 1️⃣1️⃣ Wait for rollout
      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/my-spring-api --timeout=180s

      # 1️⃣2️⃣ Debug cluster
      - name: Debug cluster
        run: |
          kubectl get pods -o wide
          kubectl get svc
