name: CI - Java matrix (17, 21)

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    name: Build and test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [21]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK and cache Maven
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - name: Build and run tests
        run: mvn -B -V clean test

      - name: Package (create jar)
        run: mvn -B -V -DskipTests package

      - name: Upload artifact (jar)
        uses: actions/upload-artifact@v4
        with:
          name: my-spring-api-jar
          path: target/*.jar

      # Build and push Docker image only on pushes to main and only for Java 21 matrix
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.java == '21'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (ghcr)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.java == '21'
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.runtime
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/my-spring-api:${{ github.sha }}
