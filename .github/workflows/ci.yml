name: CI - Java Build & Deploy

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # java: [21, 17]  # include both, Maven will use valid version
        java: [21]  # include both, Maven will use valid version        
    permissions:
      contents: read
      packages: write

    steps:
      # --- Checkout code ---
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Set up JDK and cache Maven ---
      - name: Set up JDK ${{ matrix.java }} and cache Maven
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      # --- Build and test ---
      - name: Build & run tests
        run: mvn -B -V clean test

      # --- Package JAR ---
      - name: Package application
        run: mvn -B -V -DskipTests package

      # --- Detect JAR dynamically ---
      - name: Detect JAR file
        id: jar
        run: |
          JAR_FILE=$(ls target/*.jar | xargs -n 1 basename)
          echo "JAR_FILE=$JAR_FILE" >> $GITHUB_ENV
          echo "Detected JAR: $JAR_FILE"

      # --- Upload artifact ---
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-spring-api-jar
          path: target/*.jar

      # --- Login to GHCR ---
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Login to Docker Hub ---
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --- Build and push Docker image ---
      - name: Build & push Docker image
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          GHCR_IMAGE=ghcr.io/${{ github.repository_owner }}/my-spring-api:$SHORT_SHA
          DOCKERHUB_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/my-spring-api:$SHORT_SHA
          
          # Multi-stage build
          docker build --build-arg JAR_FILE=$JAR_FILE -f Dockerfile.runtime -t $GHCR_IMAGE -t $DOCKERHUB_IMAGE .
          
          # Push to both registries
          docker push $GHCR_IMAGE
          docker push $DOCKERHUB_IMAGE

      # --- Create kind cluster ---
      - name: Set up kind cluster
        uses: engineerd/setup-kind@v1
        with:
          version: v1.30.0
          name: my-spring-api-cluster
          wait: 60

      # --- Load Docker image into kind ---
      - name: Load Docker image into kind
        run: |
          kind load docker-image ghcr.io/${{ github.repository_owner }}/my-spring-api:${GITHUB_SHA::7} --name my-spring-api-cluster

      # --- Deploy to cluster using existing manifests ---
      - name: Deploy to kind cluster
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      # --- Wait for deployment to be ready ---
      - name: Wait for deployment rollout
        run: |
          kubectl rollout status deployment/my-spring-api --timeout=2m