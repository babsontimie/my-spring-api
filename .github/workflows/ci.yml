name: CI - Java matrix (17, 21)

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    name: Build and test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [21]

    permissions:
      contents: read
      packages: write

    steps:
      # 1️⃣ Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Set up JDK and cache Maven
      - name: Set up JDK and cache Maven
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      # 3️⃣ Build and run tests
      - name: Build and run tests
        run: mvn -B -V clean test

      # 4️⃣ Package (create jar)
      - name: Package (create jar)
        run: mvn -B -V -DskipTests package

      # 5️⃣ Upload artifact (jar)
      - name: Upload artifact (jar)
        uses: actions/upload-artifact@v4
        with:
          name: my-spring-api-jar
          path: target/*.jar

      # 6️⃣ Build and push Docker image only on main branch and Java 21
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.java == '21'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (ghcr)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.java == '21'
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.runtime
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/my-spring-api:${{ github.sha }}

      # 7️⃣ Install kind
      - name: Install kind
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.java == '21'
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      # 8️⃣ Create kind cluster
      - name: Create kind cluster
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.java == '21'
        run: |
          cat <<EOF > kind-cluster.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
            - role: worker
            - role: worker
          EOF
          kind create cluster --name kind-teetestcluster --config kind-cluster.yaml

      # 9️⃣ Load Docker image into kind
      - name: Load Docker image into kind
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.java == '21'
        run: |
          kind load docker-image ghcr.io/${{ github.repository_owner }}/my-spring-api:${{ github.sha }} --name kind-teetestcluster

      # 🔟 Set up kubectl context
      - name: Set kubectl context
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.java == '21'
        run: kubectl cluster-info --context kind-kind-teetestcluster

      # 1️⃣1️⃣ Deploy Spring Boot app to kind
      - name: Deploy Spring API to kind
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.java == '21'
        run: |
          cat <<EOF > deployment.yaml
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: my-spring-api
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: my-spring-api
            template:
              metadata:
                labels:
                  app: my-spring-api
              spec:
                containers:
                  - name: my-spring-api
                    image: ghcr.io/${{ github.repository_owner }}/my-spring-api:${{ github.sha }}
                    ports:
                      - containerPort: 8080
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: my-spring-api-service
          spec:
            type: NodePort
            selector:
              app: my-spring-api
            ports:
              - protocol: TCP
                port: 8080
                nodePort: 30080
          EOF

          kubectl apply -f deployment.yaml

      # 1️⃣2️⃣ Wait for pods to be ready
      - name: Wait for pods
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.java == '21'
        run: |
          kubectl wait --for=condition=ready pod -l app=my-spring-api --timeout=120s
          kubectl get pods -o wide

      # 1️⃣3️⃣ Test API availability (optional)
      - name: Test API in kind
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.java == '21'
        run: echo "Spring API is deployed on NodePort 30080 in kind cluster"