name: CI - Java matrix (17, 21)

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    name: Build and test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # java: [17, 21]
        java: [21]        

    permissions:
      contents: read
      packages: write

    steps:
      # 1️⃣ Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Setup JDK and cache Maven
      - name: Set up JDK and cache Maven
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      # 3️⃣ Build and run tests
      - name: Build and run tests
        run: mvn -B -V clean test

      # 4️⃣ Package jar
      - name: Package (create jar)
        run: mvn -B -V -DskipTests package

      # 5️⃣ Detect JAR name dynamically
      - name: Set JAR_FILE environment variable
        id: jar-name
        run: |
          JAR_FILE=$(ls target/*.jar | xargs -n 1 basename)
          echo "JAR_FILE=$JAR_FILE" >> $GITHUB_ENV
          echo "Detected JAR: $JAR_FILE"

      # 6️⃣ Docker login GHCR
      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && matrix.java == '21'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 7️⃣ Docker login Docker Hub
      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main' && matrix.java == '21'
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # 8️⃣ Build and push Docker images (multi-stage, dynamic JAR)
      - name: Build and push Docker images
        if: github.ref == 'refs/heads/main' && matrix.java == '21'
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          GHCR_IMAGE=ghcr.io/${{ github.repository_owner }}/my-spring-api:$SHORT_SHA
          DOCKERHUB_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/my-spring-api:$SHORT_SHA
          echo "Building Docker images with JAR $JAR_FILE..."
          docker build --build-arg JAR_FILE=$JAR_FILE -f Dockerfile.runtime -t $GHCR_IMAGE -t $DOCKERHUB_IMAGE .
          docker push $GHCR_IMAGE
          docker push $DOCKERHUB_IMAGE

      # 9️⃣ Install kind
      - name: Install kind
        if: github.ref == 'refs/heads/main' && matrix.java == '21'
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      # 🔟 Create kind cluster
      - name: Create kind cluster
        if: github.ref == 'refs/heads/main' && matrix.java == '21'
        run: |
          cat <<EOF > kind-cluster.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
            - role: worker
            - role: worker
          EOF
          kind create cluster --name kind-teetestcluster --config kind-cluster.yaml

      # 1️⃣1️⃣ Load Docker images into kind
      - name: Load Docker images into kind
        if: github.ref == 'refs/heads/main' && matrix.java == '21'
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          kind load docker-image ghcr.io/${{ github.repository_owner }}/my-spring-api:$SHORT_SHA --name kind-teetestcluster
          kind load docker-image ${{ secrets.DOCKERHUB_USERNAME }}/my-spring-api:$SHORT_SHA --name kind-teetestcluster

      # 1️⃣2️⃣ Deploy Spring API to kind using k8s manifests
      - name: Deploy Spring API to kind
        if: github.ref == 'refs/heads/main' && matrix.java == '21'
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          sed -i "s|IMAGE_PLACEHOLDER|ghcr.io/${{ github.repository_owner }}/my-spring-api:$SHORT_SHA|g" k8s/deployment.yaml
          kubectl apply -f k8s/
          kubectl wait --for=condition=ready pod -l app=my-spring-api --timeout=180s
          kubectl get pods -o wide